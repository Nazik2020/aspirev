<svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Removed background rect for seamless transparency -->
  <!-- Orbit rings -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#5d21df" stroke-width="2" opacity="0.25"/>
  <circle cx="60" cy="60" r="29" fill="none" stroke="#cdbdff" stroke-width="1.5" opacity="0.4"/>
  <!-- Hexagon background -->
  <polygon points="60,38 79.1,49 79.1,71 60,82 40.9,71 40.9,49" fill="#5d21df"/>
  <polygon points="60,44 74.4,52 74.4,68 60,76 45.6,68 45.6,52" fill="#6833ea"/>
  <!-- 'S' inside Hexagon -->
  <text x="60" y="60" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">S</text>
  <!-- Decorative dots -->
  <circle cx="98" cy="18" r="6" fill="#00daf3"/>
  <circle cx="16" cy="100" r="4.5" fill="#cdbdff"/>
  <circle cx="108" cy="60" r="3.5" fill="#cdbdff" opacity="0.55"/>
  <!-- Text block centered vertically at y=60: wordmark at y=47, tagline at y=73 -->
  <text x="128" y="47" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="500" letter-spacing="-1">
    <tspan fill="#ffffff">Skilio</tspan><tspan fill="#cdbdff" dx="5">AI</tspan>
  </text>
  <text x="130" y="73" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="1.5">AI-powered career intelligence</text>
</svg>
